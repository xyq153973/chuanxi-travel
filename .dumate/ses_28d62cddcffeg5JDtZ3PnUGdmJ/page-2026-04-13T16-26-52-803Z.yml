              - 'heading "The doctor is not in, but the Chatbot is: Utah’s experience regulating mental health AI" [level=3] [ref=e128]':
                - 'link "The doctor is not in, but the Chatbot is: Utah’s experience regulating mental health AI" [ref=e129] [cursor=pointer]':
                  - /url: /articles/s41746-026-02580-y
              - paragraph [ref=e131]: Generative AI mental health agents offer scalable, low-cost support for unmet behavioral health needs, yet raise complex policy challenges. We summarize findings from Utah’s regulatory review, which informed legislation and best-practice guidance. Key insights include stakeholder divergence, evolving risk-benefit considerations, and the need for adaptive regulation. We advocate for evidence-based protocols, continuous monitoring, and holistic, inclusive policymaking to ensure safe, effective integration of these agents into mental health care.
